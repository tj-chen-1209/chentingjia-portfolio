site_name: Tingjia Chen - Embodied AI Portfolio
site_url: https://chentingjia.github.io/chentingjia-portfolio/
site_author: Tingjia Chen
site_description: Technical documentation for research projects in Embodied AI, robot learning, and vision-language-action models

repo_name: chentingjia/chentingjia-portfolio
repo_url: https://github.com/chentingjia/chentingjia-portfolio

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - glightbox

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chentingjia
    - icon: fontawesome/solid/paper-plane
      link: mailto:{{YOUR_EMAIL}}

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Projects:
      - OptiTrack ROS2 Streaming Node: projects/teleop-mocap.md
      - GR00T-N1.6 SFT on LIBERO: projects/groot-libero-reproduction.md
      - RDT SFT & Evaluation on LIBERO: projects/rdt-libero.md
      - RLinf × RDT Integration: projects/rlinf-rdt-integration.md
      - ResMerge (ICML Continual Learning): projects/icml-resmerge.md

copyright: Copyright &copy; 2024-2026 Tingjia Chen
